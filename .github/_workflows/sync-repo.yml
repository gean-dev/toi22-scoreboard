name: Sync old repo to new repo

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: repo-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check exact New York time window
        id: window
        run: |
          now=$(TZ="America/New_York" date +"%Y-%m-%d %H:%M")

          if [[ "$now" < "2026-04-27 21:30" || "$now" > "2026-04-28 02:30" ]]; then
            echo "Outside sync window: $now"
            echo "should_sync=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Inside sync window: $now"
          echo "should_sync=true" >> "$GITHUB_OUTPUT"

      - name: Check out destination repo
        if: steps.window.outputs.should_sync == 'true'
        uses: actions/checkout@v4
        with:
          repository: gean-dev/toi22-scoreboard
          ref: main
          token: ${{ secrets.REPO_SYNC_TOKEN }}
          path: destination

      - name: Sync old repo to new repo
        if: steps.window.outputs.should_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.REPO_SYNC_TOKEN }}
          OLD_REPO: Chanok203/toi22-ranking
          NEW_REPO: gean-dev/toi22-scoreboard
          BRANCH: main
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN}" ]]; then
            echo "Missing REPO_SYNC_TOKEN repository secret."
            exit 1
          fi

          git config --global user.name "repo-sync-bot"
          git config --global user.email "repo-sync-bot@users.noreply.github.com"

          git clone --branch "$BRANCH" --single-branch "https://x-access-token:${GH_TOKEN}@github.com/${OLD_REPO}.git" source

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/workflows/sync-repo.yml' \
            --exclude='index.html' \
            source/ destination/

          cd destination

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to sync."
            exit 0
          fi

          sync_time=$(TZ="America/New_York" date +"%Y-%m-%d %H:%M %Z")

          git add -A
          git commit -m "Sync from ${OLD_REPO} at ${sync_time}"

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${NEW_REPO}.git"
          git push origin "$BRANCH"

          echo "Synced ${OLD_REPO}:${BRANCH} -> ${NEW_REPO}:${BRANCH}"
